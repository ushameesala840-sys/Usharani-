<!DOCTYPE html>
<html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store Management System</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --success: #27ae60;
            --danger: #c0392b;
            --light: #f8f9fa;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #eef2f3;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 15px;
            color: var(--secondary);
            font-size: 1.2rem;
            border-bottom: 2px solid var(--light);
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-add {
            background-color: var(--success);
            color: white;
        }
        .btn-add:hover {
            background-color: #219653;
        }
        .btn-delete {
            background-color: var(--danger);
            color: white;
            padding: 5px 10px;
            font-size: 0.85rem;
            width: auto;
        }
        .btn-delete:hover {
            background-color: #a33226;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--secondary);
            color: white;
        }
        tr:hover {
            background-color: var(--light);
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .instock { background-color: #d4edda; color: #155724; }
        .lowstock { background-color: #fff3cd; color: #856404; }
        .outstock { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📚 Book Store Management System</h1>
    </header>

    <div class="main-content">
        <!-- Add Book Panel -->
        <div class="card">
            <h2>Add New Book</h2>
            <form id="bookForm">
                <div class="form-group">
                    <label for="bookTitle">Book Title</label>
                    <input type="text" id="bookTitle" required placeholder="e.g., The Great Gatsby">
                </div>
                <div class="form-group">
                    <label for="bookAuthor">Author</label>
                    <input type="text" id="bookAuthor" required placeholder="e.g., F. Scott Fitzgerald">
                </div>
                <div class="form-group">
                    <label for="bookGenre">Genre</label>
                    <select id="bookGenre">
                        <option value="Fiction">Fiction</option>
                        <option value="Non-Fiction">Non-Fiction</option>
                        <option value="Sci-Fi">Sci-Fi/Fantasy</option>
                        <option value="Biography">Biography</option>
                        <option value="Mystery">Mystery</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bookPrice">Price ($)</label>
                    <input type="number" id="bookPrice" step="0.01" min="0" required placeholder="14.99">
                </div>
                <div class="form-group">
                    <label for="bookQuantity">Quantity in Stock</label>
                    <input type="number" id="bookQuantity" min="0" required placeholder="10">
                </div>
                <button type="submit" class="btn-add">Add to Inventory</button>
            </form>
        </div>

        <!-- Inventory List Panel -->
        <div class="card">
            <h2>Current Inventory Table</h2>
            <div style="overflow-x: auto;">
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Genre</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                        <!-- Dynamic rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Initial sample data stored in an array
    let inventory = [
        { id: 1, title: "To Kill a Mockingbird", author: "Harper Lee", genre: "Fiction", price: 12.99, quantity: 15 },
        { id: 2, title: "1984", author: "George Orwell", genre: "Sci-Fi", price: 9.99, quantity: 3 },
        { id: 3, title: "A Brief History of Time", author: "Stephen Hawking", genre: "Non-Fiction", price: 18.99, quantity: 0 }
    ];

    const bookForm = document.getElementById('bookForm');
    const inventoryBody = document.getElementById('inventoryBody');

    // Function to determine stock status badge
    function getStatusBadge(quantity) {
        if (quantity === 0) {
            return '<span class="badge outstock">Out of Stock</span>';
        } else if (quantity <= 5) {
            return '<span class="badge lowstock">Low Stock</span>';
        } else {
            return '<span class="badge instock">In Stock</span>';
        }
    }

    // Function to render the table rows from the array
    function renderInventory() {
        inventoryBody.innerHTML = '';
        
        inventory.forEach(book => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${book.title}</strong></td>
                <td>${book.author}</td>
                <td>${book.genre}</td>
                <td>$${book.price.toFixed(2)}</td>
                <td>${book.quantity}</td>
                <td>${getStatusBadge(book.quantity)}</td>
                <td><button class="btn-delete" onclick="deleteBook(${book.id})">Remove</button></td>
            `;
            inventoryBody.appendChild(row);
        });
    }

    // Function to add a book from the form submissions
    bookForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const newBook = {
            id: Date.now(), // Unique ID using timestamp
            title: document.getElementById('bookTitle').value,
            author: document.getElementById('bookAuthor').value,
            genre: document.getElementById('bookGenre').value,
            price: parseFloat(document.getElementById('bookPrice').value),
            quantity: parseInt(document.getElementById('bookQuantity').value)
        };

        inventory.push(newBook);
        renderInventory();
        bookForm.reset(); // Clear form inputs
    });

    // Function to remove a book by ID
    function deleteBook(id) {
        inventory = inventory.filter(book => book.id !== id);
        renderInventory();
    }

    // Run render function on initial page load
    renderInventory();
</script>

</body>
</html>

  <head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
      <h1 class="title">Hello World!</h1>
      <p id="currentTime"></p>
      <script src="script.js"></script>
  </body>
</html>
